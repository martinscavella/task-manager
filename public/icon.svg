<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#18181b"/>
  <!-- Checklist lines -->
  <!-- Line 1: checkbox + bar -->
  <rect x="13" y="18" width="9" height="9" rx="2.5" fill="none" stroke="#a1a1aa" stroke-width="2"/>
  <polyline points="15,22.5 17,25 21,20" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="27" y="20" width="24" height="2.5" rx="1.25" fill="#3f3f46"/>
  <!-- Line 2: checkbox + bar -->
  <rect x="13" y="32" width="9" height="9" rx="2.5" fill="none" stroke="#a1a1aa" stroke-width="2"/>
  <polyline points="15,36.5 17,39 21,34" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="27" y="34" width="18" height="2.5" rx="1.25" fill="#3f3f46"/>
  <!-- Line 3: empty checkbox + shorter bar -->
  <rect x="13" y="46" width="9" height="9" rx="2.5" fill="none" stroke="#52525b" stroke-width="2"/>
  <rect x="27" y="48" width="13" height="2.5" rx="1.25" fill="#3f3f46"/>
</svg>
